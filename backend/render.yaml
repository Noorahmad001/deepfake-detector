services:
  - type: web
    name: deepfake-detector-api
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: MAX_IMAGE_SIZE_MB
        value: "10"
      - key: MAX_VIDEO_SIZE_MB
        value: "100"